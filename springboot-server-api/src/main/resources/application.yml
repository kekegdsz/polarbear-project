spring:
  application:
    name: springboot-server-api
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:springboot_api;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.undersky.api.springbootserverapi.model.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8082
  servlet:
    context-path: /api

# Netty 即时通讯 WebSocket（与 Tomcat 独立端口）
im:
  netty:
    port: 19080
    path: /im/ws

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
