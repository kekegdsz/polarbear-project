spring:
  application:
    name: springboot-server-api
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:springboot_api;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.undersky.api.springbootserverapi.model.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8082
  servlet:
    context-path: /api

# IM：附件目录 + Netty WebSocket（独立端口）
im:
  upload:
    dir: ${IM_UPLOAD_DIR:./data/im-upload}
  # 管理后台向群/指定用户发系统消息时的 from_user_id（须存在于 users 表，schema 已插入 id=999）
  system-sender-user-id: ${IM_SYSTEM_SENDER_ID:999}
  netty:
    port: 19080
    path: /im/ws

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
