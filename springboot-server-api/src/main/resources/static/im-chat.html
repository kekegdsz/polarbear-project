<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ededed" />
  <title>IM 联调</title>
  <style>
    :root {
      --wx-green: #07c160;
      --wx-bubble-out: #95ec69;
      --wx-bubble-in: #ffffff;
      --wx-bg: #ededed;
      --wx-nav: #ededed;
      --wx-text: #111;
      --wx-sub: #888;
      --wx-line: #d9d9d9;
      --wx-safe-bottom: env(safe-area-inset-bottom, 0px);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: #000; }
    body { display: flex; justify-content: center; align-items: stretch; }

    .wx-shell {
      width: 100%;
      max-width: 430px;
      min-height: 100%;
      background: var(--wx-bg);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.35);
    }

    /* 顶栏（仿微信聊天标题栏） */
    .wx-nav {
      flex-shrink: 0;
      height: 48px;
      padding: 0 12px;
      padding-top: max(8px, env(safe-area-inset-top, 0px));
      background: var(--wx-nav);
      border-bottom: 1px solid var(--wx-line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 17px;
      font-weight: 600;
      color: var(--wx-text);
    }
    .wx-nav-back {
      width: 40px;
      font-size: 26px;
      line-height: 1;
      color: #576b95;
      cursor: default;
      user-select: none;
    }
    .wx-nav-title { flex: 1; text-align: center; }
    .wx-nav-more {
      width: 40px;
      text-align: right;
      font-size: 20px;
      letter-spacing: 2px;
      color: var(--wx-text);
      cursor: pointer;
      user-select: none;
    }

    /* 消息区 */
    .wx-chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 8px;
      -webkit-overflow-scrolling: touch;
    }
    .wx-time {
      text-align: center;
      font-size: 12px;
      color: var(--wx-sub);
      margin: 10px 0;
    }
    .wx-row {
      display: flex;
      margin-bottom: 12px;
      align-items: flex-end;
    }
    .wx-row.out { justify-content: flex-end; }
    .wx-row.in { justify-content: flex-start; }
    .wx-row.sys { justify-content: center; }
    .wx-bubble {
      max-width: 78%;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 16px;
      line-height: 1.45;
      word-break: break-word;
      position: relative;
      box-shadow: 0 1px 1px rgba(0,0,0,0.04);
    }
    .wx-row.in .wx-bubble {
      background: var(--wx-bubble-in);
      color: var(--wx-text);
    }
    .wx-row.out .wx-bubble {
      background: var(--wx-bubble-out);
      color: var(--wx-text);
    }
    .wx-row.sys .wx-bubble {
      max-width: 92%;
      background: rgba(0,0,0,0.06);
      color: var(--wx-sub);
      font-size: 13px;
      padding: 6px 10px;
      box-shadow: none;
    }
    .wx-json {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 11px;
      opacity: 0.85;
      margin-top: 6px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* 底部工具条 */
    .wx-footer {
      flex-shrink: 0;
      background: #f7f7f7;
      border-top: 1px solid var(--wx-line);
      padding: 8px 10px calc(8px + var(--wx-safe-bottom));
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .wx-btn-icon {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 20px;
      line-height: 32px;
      text-align: center;
      cursor: pointer;
    }
    .wx-input-fake {
      flex: 1;
      min-height: 36px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 15px;
      color: #999;
      cursor: pointer;
    }
    .wx-send {
      padding: 0 14px;
      height: 36px;
      border: none;
      border-radius: 4px;
      background: var(--wx-green);
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    .wx-send:disabled {
      background: #9bdbb0;
      cursor: not-allowed;
    }

    /* 功能面板（仿微信设置列表） */
    .wx-mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      max-width: 430px;
      margin: 0 auto;
    }
    .wx-mask.open { display: block; }
    .wx-sheet {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 88vh;
      background: var(--wx-bg);
      border-radius: 12px 12px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .wx-sheet-head {
      padding: 14px 16px;
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      background: #f7f7f7;
      border-bottom: 1px solid var(--wx-line);
    }
    .wx-sheet-body {
      overflow-y: auto;
      padding: 0 0 20px;
    }
    .wx-cell {
      background: #fff;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }
    .wx-cell label { display: block; font-size: 13px; color: var(--wx-sub); margin-bottom: 6px; }
    .wx-cell input, .wx-cell select, .wx-cell textarea {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 15px;
    }
    .wx-cell textarea { min-height: 56px; resize: vertical; }
    .wx-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
    }
    .wx-actions button {
      flex: 1;
      min-width: 42%;
      padding: 10px 8px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      background: var(--wx-green);
      color: #fff;
      cursor: pointer;
    }
    .wx-actions button.secondary {
      background: #f2f2f2;
      color: #333;
    }
    .wx-close-sheet {
      margin: 12px 16px;
      width: calc(100% - 32px);
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #fff;
      font-size: 16px;
      color: #576b95;
      cursor: pointer;
    }
    .hint-mini {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--wx-sub);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="wx-shell">
    <header class="wx-nav">
      <span class="wx-nav-back">‹</span>
      <span class="wx-nav-title">IM 联调</span>
      <span class="wx-nav-more" id="btnOpenSheet" title="连接与功能">···</span>
    </header>

    <div class="wx-chat" id="chatScroll">
      <div id="chatList"></div>
    </div>

    <footer class="wx-footer">
      <span class="wx-btn-icon" id="btnOpenSheet2">⊕</span>
      <div class="wx-input-fake" id="fakeInputHint">点击「发送」或右上角「···」打开功能面板</div>
      <button type="button" class="wx-send" id="btnQuickSend" disabled>发送</button>
    </footer>
  </div>

  <div class="wx-mask" id="sheetMask">
    <div class="wx-sheet">
      <div class="wx-sheet-head">连接与调试</div>
      <div class="wx-sheet-body">
        <p class="hint-mini">WebSocket：<code id="pageUrlHint"></code> 同页使用 <code>/api/im/ws</code>（若站点走 <code>:8081</code>，地址为 <code>ws://主机:8081/api/im/ws</code>）。演示用户 101 / 102 / 103。</p>

        <div class="wx-cell">
          <label>WS 地址</label>
          <input type="text" id="wsUrl" placeholder="ws://..." />
        </div>
        <div class="wx-cell">
          <label>登录身份</label>
          <select id="userId">
            <option value="101">101 alice</option>
            <option value="102">102 bob</option>
            <option value="103">103 carol</option>
          </select>
        </div>
        <div class="wx-actions">
          <button type="button" id="btnConnect">连接并登录</button>
          <button type="button" class="secondary" id="btnDisconnect" disabled>断开</button>
        </div>

        <div class="wx-cell">
          <label>单聊 → 对方 userId</label>
          <input type="number" id="peerId" value="102" />
        </div>
        <div class="wx-cell">
          <label>单聊内容</label>
          <textarea id="p2pBody" placeholder="输入消息…"></textarea>
        </div>
        <div class="wx-actions">
          <button type="button" id="btnP2pSend">发私聊</button>
          <button type="button" class="secondary" id="btnP2pHistory">私聊记录</button>
        </div>

        <div class="wx-cell">
          <label>群名称</label>
          <input type="text" id="groupName" value="测试群" />
        </div>
        <div class="wx-cell">
          <label>群 ID</label>
          <input type="number" id="groupId" placeholder="建群后自动填入" />
        </div>
        <div class="wx-actions">
          <button type="button" id="btnCreateGroup">建群</button>
          <button type="button" class="secondary" id="btnJoinGroup">加入群</button>
        </div>
        <div class="wx-cell">
          <label>群消息</label>
          <textarea id="groupBody" placeholder="输入群消息…"></textarea>
        </div>
        <div class="wx-actions">
          <button type="button" id="btnGroupSend">发群消息</button>
          <button type="button" class="secondary" id="btnGroupHistory">群记录</button>
          <button type="button" class="secondary" id="btnGroupInfo">群资料</button>
        </div>

        <div class="wx-actions">
          <button type="button" class="secondary" id="btnConversations">最近会话</button>
          <button type="button" class="secondary" id="btnUserInfo">查用户</button>
        </div>
        <div class="wx-cell">
          <label>查询用户 ID</label>
          <input type="number" id="queryUserId" value="102" />
        </div>

        <div class="wx-actions">
          <button type="button" class="secondary" id="btnClearLog">清空聊天记录</button>
        </div>

        <button type="button" class="wx-close-sheet" id="btnCloseSheet">关 闭</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var wsUrlInput = document.getElementById('wsUrl');
      var chatList = document.getElementById('chatList');
      var chatScroll = document.getElementById('chatScroll');
      var sheetMask = document.getElementById('sheetMask');
      var btnQuickSend = document.getElementById('btnQuickSend');
      var ws = null;

      function openSheet() { sheetMask.classList.add('open'); }
      function closeSheet() { sheetMask.classList.remove('open'); }
      document.getElementById('btnOpenSheet').onclick = openSheet;
      document.getElementById('btnOpenSheet2').onclick = openSheet;
      document.getElementById('btnCloseSheet').onclick = closeSheet;
      sheetMask.onclick = function (e) { if (e.target === sheetMask) closeSheet(); };

      (function showPageUrl() {
        var el = document.getElementById('pageUrlHint');
        if (!el) return;
        el.textContent = location.origin + '/im-chat.html';
      })();

      function defaultWsUrl() {
        var p = location.protocol === 'https:' ? 'wss:' : 'ws:';
        return p + '//' + location.host + '/api/im/ws';
      }
      wsUrlInput.value = defaultWsUrl();

      function scrollBottom() {
        chatScroll.scrollTop = chatScroll.scrollHeight;
      }

      function pushTime() {
        var t = document.createElement('div');
        t.className = 'wx-time';
        t.textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        chatList.appendChild(t);
      }

      function pushBubble(text, kind, rawJson) {
        var row = document.createElement('div');
        row.className = 'wx-row ' + (kind === 'out' ? 'out' : kind === 'sys' ? 'sys' : 'in');
        var b = document.createElement('div');
        b.className = 'wx-bubble';
        b.textContent = text;
        if (rawJson) {
          var j = document.createElement('div');
          j.className = 'wx-json';
          j.textContent = rawJson;
          b.appendChild(j);
        }
        row.appendChild(b);
        chatList.appendChild(row);
        scrollBottom();
      }

      function formatIncoming(raw) {
        try {
          var j = JSON.parse(raw);
          switch (j.type) {
            case 'AUTH_OK':
              return { text: '登录成功', kind: 'sys', raw: null };
            case 'PRIVATE_MESSAGE':
              return { text: (j.fromUserId != null ? '用户 ' + j.fromUserId + '：' : '') + (j.body || ''), kind: 'in', raw: null };
            case 'GROUP_MESSAGE':
              return { text: '[群' + (j.groupId != null ? j.groupId : '') + '] ' + (j.fromUserId != null ? j.fromUserId + '：' : '') + (j.body || ''), kind: 'in', raw: null };
            case 'GROUP_SYSTEM':
              return { text: j.body || '群提示', kind: 'sys', raw: null };
            case 'ERROR':
              return { text: '错误：' + (j.message || raw), kind: 'sys', raw: null };
            case 'GROUP_CREATED':
              return { text: '已建群「' + (j.name || '') + '」ID ' + j.groupId, kind: 'sys', raw: null };
            case 'GROUP_JOIN_OK':
              return { text: '入群成功 #' + j.groupId, kind: 'sys', raw: null };
            case 'HISTORY_RESULT':
              return { text: '历史消息（' + ((j.messages && j.messages.length) || 0) + ' 条）', kind: 'sys', raw: raw.length > 400 ? raw.slice(0, 400) + '…' : raw };
            case 'CONVERSATIONS_RESULT':
              return { text: '最近会话（' + ((j.items && j.items.length) || 0) + ' 个）', kind: 'sys', raw: raw.length > 400 ? raw.slice(0, 400) + '…' : raw };
            case 'USER_INFO_RESULT':
              return { text: '用户：' + (j.username || j.userId), kind: 'sys', raw: null };
            case 'GROUP_INFO_RESULT':
              return { text: '群「' + (j.name || '') + '」成员 ' + (j.memberCount != null ? j.memberCount : '') + ' 人', kind: 'sys', raw: null };
            default:
              return { text: j.type || '消息', kind: 'in', raw: raw.length > 280 ? raw.slice(0, 280) + '…' : raw };
          }
        } catch (e) {
          return { text: raw, kind: 'in', raw: null };
        }
      }

      function logIncoming(raw) {
        var f = formatIncoming(raw);
        pushTime();
        pushBubble(f.text, f.kind, f.raw);
        try {
          var j = JSON.parse(raw);
          if (j.type === 'GROUP_CREATED' && j.groupId) {
            document.getElementById('groupId').value = j.groupId;
          }
        } catch (e) { /* ignore */ }
      }

      function setConnected(on) {
        btnQuickSend.disabled = !on;
        document.getElementById('btnDisconnect').disabled = !on;
        document.getElementById('btnConnect').disabled = on;
      }

      function send(obj) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          pushBubble('未连接，请先点「连接并登录」', 'sys', null);
          return;
        }
        var s = JSON.stringify(obj);
        ws.send(s);
        pushTime();
        pushBubble('已发送「' + (obj.type || '') + '」', 'out', s);
        scrollBottom();
      }

      btnQuickSend.onclick = function () {
        var body = document.getElementById('p2pBody').value.trim();
        if (!body) {
          openSheet();
          return;
        }
        send({
          type: 'PRIVATE_SEND',
          toUserId: parseInt(document.getElementById('peerId').value, 10),
          body: body
        });
        document.getElementById('p2pBody').value = '';
      };

      document.getElementById('fakeInputHint').onclick = function () { openSheet(); };

      document.getElementById('btnClearLog').onclick = function () {
        chatList.innerHTML = '';
      };

      document.getElementById('btnConnect').onclick = function () {
        if (ws) ws.close();
        var url = wsUrlInput.value.trim();
        ws = new WebSocket(url);
        document.getElementById('btnConnect').disabled = true;
        ws.onopen = function () {
          pushBubble('网络已连接', 'sys', null);
          var uid = parseInt(document.getElementById('userId').value, 10);
          send({ type: 'AUTH', userId: uid });
          setConnected(true);
        };
        ws.onclose = function () {
          pushBubble('连接已断开', 'sys', null);
          setConnected(false);
        };
        ws.onerror = function () {
          pushBubble('连接失败，请检查 /api/im/ws 与 Spring 是否启动', 'sys', null);
          document.getElementById('btnConnect').disabled = false;
        };
        ws.onmessage = function (ev) {
          logIncoming(ev.data);
        };
      };

      document.getElementById('btnDisconnect').onclick = function () {
        if (ws) ws.close();
      };

      document.getElementById('btnP2pSend').onclick = function () {
        send({
          type: 'PRIVATE_SEND',
          toUserId: parseInt(document.getElementById('peerId').value, 10),
          body: document.getElementById('p2pBody').value
        });
      };

      document.getElementById('btnP2pHistory').onclick = function () {
        send({
          type: 'HISTORY',
          mode: 'P2P',
          peerUserId: parseInt(document.getElementById('peerId').value, 10),
          limit: 30
        });
      };

      document.getElementById('btnCreateGroup').onclick = function () {
        send({ type: 'GROUP_CREATE', name: document.getElementById('groupName').value });
      };

      document.getElementById('btnJoinGroup').onclick = function () {
        var gid = document.getElementById('groupId').value;
        if (!gid) { pushBubble('请填写群 ID', 'sys', null); return; }
        send({ type: 'GROUP_JOIN', groupId: parseInt(gid, 10) });
      };

      document.getElementById('btnGroupSend').onclick = function () {
        var gid = document.getElementById('groupId').value;
        if (!gid) { pushBubble('请填写群 ID', 'sys', null); return; }
        send({
          type: 'GROUP_SEND',
          groupId: parseInt(gid, 10),
          body: document.getElementById('groupBody').value
        });
      };

      document.getElementById('btnGroupHistory').onclick = function () {
        var gid = document.getElementById('groupId').value;
        if (!gid) { pushBubble('请填写群 ID', 'sys', null); return; }
        send({ type: 'HISTORY', mode: 'GROUP', groupId: parseInt(gid, 10), limit: 30 });
      };

      document.getElementById('btnGroupInfo').onclick = function () {
        var gid = document.getElementById('groupId').value;
        if (!gid) { pushBubble('请填写群 ID', 'sys', null); return; }
        send({ type: 'GROUP_INFO', groupId: parseInt(gid, 10) });
      };

      document.getElementById('btnConversations').onclick = function () {
        send({ type: 'CONVERSATIONS' });
      };

      document.getElementById('btnUserInfo').onclick = function () {
        send({ type: 'USER_INFO', userId: parseInt(document.getElementById('queryUserId').value, 10) });
      };

      setConnected(false);
    })();
  </script>
</body>
</html>
